name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Replace 'Molki' with your actual HF username if it is different
        run: git push --force https://Molki:$HF_TOKEN@huggingface.co/spaces/Molki/dnd-rag-assistant main